<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Clean — Equipamentos profissionais para limpeza solar</title>
<meta name="description" content="Equipamentos brushless, sem químicos, até 260 painéis por hora. Treinamento e plataforma de serviços para técnicos solares.">
<link rel="stylesheet" href="public/tokens.css">
<style>
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--pc-cream); color: var(--fg-on-cream-1); font: var(--body); -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--pc-green); color: var(--pc-dark); }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: 0; background: none; }

  .container { max-width: var(--container); margin: 0 auto; padding: 0 var(--gutter); }
  @media (min-width: 768px) { .container { padding: 0 40px; } }
  @media (min-width: 1280px) { .container { padding: 0 56px; } }

  .display { font-family: var(--font-display); letter-spacing: var(--tracking-tight); font-weight: 600; }
  .eyebrow {
    font: var(--eyebrow);
    text-transform: uppercase;
    letter-spacing: var(--tracking-eyebrow);
    color: var(--pc-green);
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eyebrow::before { content: ""; width: 28px; height: 1px; background: currentColor; }
  .eyebrow.center::before, .eyebrow.no-rule::before { display: none; }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--pc-green); color: var(--pc-dark);
    font: var(--button); font-size: 15px;
    padding: 16px 26px; border-radius: var(--radius-md);
    transition: background var(--dur-base) var(--ease-out), transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out);
    box-shadow: 0 8px 24px rgba(58,213,128,.20);
  }
  .btn-primary:hover { background: #4FE090; transform: translateY(-2px); box-shadow: 0 12px 32px rgba(58,213,128,.32); }

  .btn-ghost-dark {
    display: inline-flex; align-items: center; gap: 10px;
    border: 1px solid var(--border-on-dark-strong); color: var(--fg-1);
    font: var(--button); font-size: 15px;
    padding: 16px 24px; border-radius: var(--radius-md);
    transition: background var(--dur-base), border-color var(--dur-base);
  }
  .btn-ghost-dark:hover { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.32); }

  .btn-outline-dark {
    display: inline-flex; align-items: center; gap: 10px;
    border: 1px solid var(--fg-on-cream-1); color: var(--fg-on-cream-1);
    font-weight: 600; font-size: 14px; padding: 13px 22px;
    border-radius: var(--radius-pill);
    transition: background var(--dur-base), color var(--dur-base);
  }
  .btn-outline-dark:hover { background: var(--fg-on-cream-1); color: white; }

  /* Animations */
  @keyframes fadeUp { from { opacity:0; transform: translateY(24px);} to { opacity:1; transform:translateY(0);} }
  @keyframes kenburns { 0% { transform: scale(1.02); } 100% { transform: scale(1.12); } }
  @keyframes pulseDot { 0%,100% { opacity:.5; } 50% { opacity:1; } }
  @keyframes marquee { 0% { transform: translateX(0);} 100% { transform: translateX(-50%);} }
  @keyframes countUp { from { opacity:0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

const WhatsBrand = ({ size=16 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>

// === LOGO — real brandbook dot-pattern + wordmark ===
const Logo = ({ textColor="white" }) => (
  <a href="#" style={{display:"inline-flex", alignItems:"center", gap:10, textDecoration:"none"}}>

      style={{width:36, height:36, borderRadius:8, display:"block"}} />

// === NAV ===
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(()=>{
    const f=()=>setScrolled(window.scrollY>12);
    window.addEventListener("scroll", f);
    return ()=>window.removeEventListener("scroll", f);
  },[]);
  const links = [
    {label:"Equipamentos", href:"#equipamentos"},
    {label:"Comparativo", href:"#comparativo"},
    {label:"Treinamento", href:"#treinamento"},
    {label:"Plataforma", href:"#plataforma"},
    {label:"Calculadora", href:"#roi"},
  ];
  return (
    <header style={{
      position:"fixed", top:0, left:0, right:0, zIndex:60,
      background: scrolled ? "rgba(12,40,31,0.88)" : "transparent",
      backdropFilter: scrolled ? "blur(14px)" : "none",
      WebkitBackdropFilter: scrolled ? "blur(14px)" : "none",
      borderBottom: scrolled ? "1px solid var(--border-on-dark)" : "1px solid transparent",
      transition: "all 240ms var(--ease-out)",
    }}>
      <div className="container" style={{height:76, display:"flex", alignItems:"center", justifyContent:"space-between"}}>
        <Logo />
        <nav className="nav-links" style={{display:"flex", alignItems:"center", gap:32}}>
          {links.map(l=>(
            <a key={l.href} href={l.href} style={{
              color:"var(--fg-2)", fontSize:14, fontWeight:500, transition:"color 200ms"
            }} onMouseEnter={e=>e.currentTarget.style.color="white"}
               onMouseLeave={e=>e.currentTarget.style.color="var(--fg-2)"}>{l.label}</a>
          ))}
        </nav>
        <a href={wa()} target="_blank" rel="noopener noreferrer"
          style={{display:"inline-flex", alignItems:"center", gap:8, background:"var(--pc-green)", color:"var(--pc-dark)", fontWeight:700, fontSize:14, padding:"11px 18px", borderRadius:"var(--radius-pill)", transition:"all 180ms"}}
          onMouseEnter={e=>{e.currentTarget.style.background="#4FE090"; e.currentTarget.style.transform="translateY(-1px)";}}
          onMouseLeave={e=>{e.currentTarget.style.background="var(--pc-green)"; e.currentTarget.style.transform="translateY(0)";}}>
          <WhatsBrand size={14} /> WhatsApp
        </a>
      </div>
      <style>{`@media (max-width: 980px) { .nav-links { display:none !important; } }`}</style>

// === HERO ===
const heroSlides = [
  {
    eyebrow: "Linha profissional",
    title: ["Limpe mais.", "Ganhe mais.", "Em menos tempo."],
    accentLine: 2,
    description: "Motor brushless, sem produtos químicos, até 260 painéis por hora. Tecnologia profissional para quem vive de solar.",
    primary: { label: "Ver equipamentos", href: "#equipamentos" },
    secondary: { label: "Plataforma de serviços", href: "https://painel-clean-v2.vercel.app" },
    image: "public/images/hero-1.jpg",
    meta: [{k:"260", v:"painéis/h"},{k:"+30%", v:"geração"},{k:"0", v:"químicos"}],
  },
  {
    eyebrow: "Promoção — tempo limitado",
    title: ["Refil de cerdas.", "20% off.", "Estoque limitado."],
    accentLine: 1,
    description: "Cerdas profissionais para vidro fotovoltaico. Substituição rápida, mesmo desempenho do dia 1.",
    primary: { label: "Aproveitar oferta", href: wa("Olá! Quero aproveitar o desconto no Refil de Cerdas.") },
    secondary: { label: "Ver todos os produtos", href: "#equipamentos" },
    image: "public/images/hero-promo.jpg",
    meta: [{k:"R$ 290", v:"de"},{k:"R$ 232", v:"por", highlight:true},{k:"20%", v:"off"}],
  },
  {
    eyebrow: "Novo no YouTube",
    title: ["Como limpar", "500 painéis", "em 3 horas."],
    accentLine: 1,
    description: "Rotina completa de um técnico profissional Painel Clean. Do setup ao relatório final, sem cortes.",
    primary: { label: "Assistir agora", href: "#" },
    secondary: { label: "Ver mais conteúdos", href: "#" },
    image: "public/images/hero-video.jpg",
    meta: [{k:"13min", v:"de vídeo"},{k:"Cap. 1", v:"rotina pro"},{k:"Grátis", v:"no YouTube"}],
  },
];

function Hero() {
  const t = useT();
  const [idx, setIdx] = useState(0);
  const [progress, setProgress] = useState(0);
  const total = heroSlides.length;
  const SLIDE_MS = 7000;
  const TR = t.heroTreatment;
  const accent = t.heroAccent;
  const overlayBg = {
    gradient: "linear-gradient(90deg, var(--pc-darker) 0%, rgba(12,40,31,0.50) 18%, rgba(12,40,31,0) 40%), linear-gradient(180deg, rgba(12,40,31,0.30) 0%, rgba(12,40,31,0) 30%, rgba(12,40,31,0.55) 100%)",
    split: "linear-gradient(90deg, var(--pc-darker) 0%, var(--pc-darker) 8%, rgba(12,40,31,0) 9%)",
    duotone: "linear-gradient(135deg, rgba(15,56,43,0.78) 0%, rgba(58,213,128,0.32) 100%)",
    minimal: "linear-gradient(90deg, rgba(12,40,31,0.85) 0%, rgba(12,40,31,0.25) 30%, rgba(12,40,31,0) 60%)",
    dotted: "linear-gradient(90deg, var(--pc-darker) 0%, rgba(12,40,31,0.55) 25%, rgba(12,40,31,0.25) 60%)",
  }[TR] || "var(--pc-darker)";
  useEffect(()=>{
    setProgress(0);
    const start = Date.now();
    const t = setInterval(()=>{
      const p = Math.min(1, (Date.now()-start)/SLIDE_MS);
      setProgress(p);
      if (p>=1) setIdx(i=>(i+1)%total);
    }, 40);
    return ()=>clearInterval(t);
  }, [idx]);

  const s = heroSlides[idx];

  return (
    <section style={{position:"relative", background:"var(--pc-darker)", color:"white", minHeight:"100vh", display:"flex", flexDirection:"column", overflow:"hidden", paddingTop:76}}>
      <div style={{position:"absolute", inset:0, background:"radial-gradient(ellipse 80% 60% at 0% 30%, rgba(58,213,128,.10), transparent 60%), radial-gradient(ellipse 60% 50% at 100% 100%, rgba(58,213,128,.06), transparent 60%)", pointerEvents:"none"}} />
      <div className="hero-grid" style={{flex:1, display:"grid", gridTemplateColumns:"minmax(0,1fr) minmax(0,1.05fr)", alignItems:"stretch", minHeight:"calc(100vh - 76px)"}}>
        <div className="hero-text" style={{display:"flex", flexDirection:"column", justifyContent:"center", padding:"64px 56px 96px", position:"relative", zIndex:2}}>
          <div style={{maxWidth:640}} key={idx}>
            <div style={{display:"inline-flex", alignItems:"center", gap:10, padding:"8px 14px", borderRadius:"var(--radius-pill)", background:"var(--accent-fill-soft)", border:"1px solid var(--border-accent)", color:"var(--pc-green)", font:"var(--eyebrow)", textTransform:"uppercase", letterSpacing:"var(--tracking-eyebrow)", marginBottom:32, animation:"fadeUp 600ms ease both"}}>
              <span style={{width:6, height:6, borderRadius:"50%", background:"var(--pc-green)", animation:"pulseDot 1.6s infinite"}} />
              {s.eyebrow}
            </div>
            <h1 className="display" style={{fontSize:"clamp(44px, 6.2vw, 84px)", fontWeight:600, lineHeight:1.02, letterSpacing:"-0.035em", margin:"0 0 28px"}}>
              {s.title.map((line,i)=>(
                <span key={i} style={{display:"block", color: i===s.accentLine?accent:"white", animation:`fadeUp 700ms ${i*90}ms ease both`}}>{line}</span>
              ))}
            </h1>
            <p style={{font:"var(--body-lg)", color:"var(--fg-3)", maxWidth:520, margin:"0 0 40px", animation:"fadeUp 800ms 280ms ease both"}}>{s.description}</p>
            <div style={{display:"flex", gap:14, flexWrap:"wrap", marginBottom:56, animation:"fadeUp 800ms 380ms ease both"}}>
              <a href={s.primary.href} className="btn-primary">{s.primary.label}<Icon name="arrowRight" size={16} /></a>
              <a href={s.secondary.href} target={s.secondary.href.startsWith("http")?"_blank":undefined} rel="noopener noreferrer" className="btn-ghost-dark">{s.secondary.label}</a>
            </div>
            <div style={{display:"flex", gap:36, flexWrap:"wrap", paddingTop:28, borderTop:"1px solid var(--border-on-dark)", animation:"fadeUp 900ms 480ms ease both"}}>
              {s.meta.map((m,i)=>(
                <div key={i}>
                  <div className="display" style={{fontSize:24, fontWeight:600, letterSpacing:"-0.02em", color:m.highlight?"var(--pc-green)":"white", lineHeight:1, marginBottom:6}}>{m.k}</div>
                  <div style={{font:"var(--body-xs)", color:"var(--fg-4)", textTransform:"uppercase", letterSpacing:"0.1em"}}>{m.v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div className="hero-image-wrap" style={{position:"relative", overflow:"hidden", minHeight:440}}>
          {heroSlides.map((sl, i)=>(
            <div key={i} style={{position:"absolute", inset:0, opacity:i===idx?1:0, transition:"opacity 900ms ease"}}>
              <div style={{position:"absolute", inset:0, backgroundImage:`url('${sl.image}')`, backgroundSize:"cover", backgroundPosition:"center", animation:i===idx?"kenburns 14s ease-out forwards":"none"}} />
            </div>
          ))}
          <div className="hero-overlay" style={{position:"absolute", inset:0, background:overlayBg, pointerEvents:"none"}} />
          {TR==="dotted" && (
            <svg style={{position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none", mixBlendMode:"multiply", opacity:0.55}} aria-hidden="true">
              <defs><pattern id="hero-dots" width="6" height="6" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#0A1F17" /></pattern></defs>
              <rect width="100%" height="100%" fill="url(#hero-dots)" />
            </svg>
          )}
          {TR==="duotone" && (
            <div style={{position:"absolute", inset:0, background:`linear-gradient(135deg, var(--pc-darker) 0%, ${accent} 100%)`, mixBlendMode:"color", opacity:0.85, pointerEvents:"none"}} />
          )}

// === ROI CALCULATOR (NEW) ===
function ROI() {
  const [kwp, setKwp] = useState(50);
  const TARIFF = 0.95; // R$/kWh — média BR
  const HOURS_SUN = 4.5; // h/dia
  const DAYS = 30;
  const monthlyGen = kwp * HOURS_SUN * DAYS; // kWh/mês
  const monthlyRevenue = monthlyGen * TARIFF;
  const lossDirty = 0.30; // até 30%
  const recovered = monthlyRevenue * lossDirty;
  const annualRecovered = recovered * 12;
  return (
    <section id="roi" style={{background:"var(--pc-cream)", padding:"120px 0", borderTop:"1px solid var(--border-on-cream)"}}>
      <div className="container">
        <div style={{display:"grid", gridTemplateColumns:"minmax(0, 1fr) minmax(0, 1.1fr)", gap:64, alignItems:"center"}} className="roi-grid">

            <h2 className="display" style={{fontSize:"clamp(36px, 4.4vw, 56px)", lineHeight:1.05, color:"var(--fg-on-cream-1)", margin:"0 0 20px"}}>

            <p style={{font:"var(--body-lg)", color:"var(--fg-on-cream-2)", margin:"0 0 32px", maxWidth:480}}>
              Painéis sujos podem perder até 30% de geração. Mova o slider e veja o quanto você recupera com limpeza profissional regular.
            </p>
            <div style={{padding:"28px 28px", background:"white", border:"1px solid var(--border-on-cream)", borderRadius:"var(--radius-xl)"}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:18}}>
                <label htmlFor="kwp" style={{fontSize:13, fontWeight:600, color:"var(--fg-on-cream-2)", textTransform:"uppercase", letterSpacing:"0.08em"}}>Potência da usina</label>
                <span className="display" style={{fontSize:32, fontWeight:600, color:"var(--pc-dark)", letterSpacing:"-0.02em"}}>{kwp} <span style={{fontSize:14, color:"var(--fg-on-cream-3)"}}>kWp</span></span>
              </div>
              <input id="kwp" type="range" min="5" max="500" step="5" value={kwp} onChange={e=>setKwp(+e.target.value)}
                style={{width:"100%", accentColor:"var(--pc-green-2)"}} />
              <div style={{display:"flex", justifyContent:"space-between", fontSize:11, color:"var(--fg-on-cream-3)", marginTop:6}}>
                <span>5 kWp</span><span>residencial · comercial · usina</span><span>500 kWp</span>
              </div>
            </div>
          </div>
          <div style={{background:"linear-gradient(155deg, var(--pc-dark) 0%, var(--pc-darker) 100%)", color:"white", borderRadius:"var(--radius-2xl)", padding:"48px 44px", position:"relative", overflow:"hidden", border:"1px solid var(--border-accent)"}}>
            <div style={{position:"absolute", top:-100, right:-100, width:280, height:280, background:"radial-gradient(circle, rgba(58,213,128,0.18) 0%, transparent 70%)", pointerEvents:"none"}} />
            <div style={{position:"relative"}}>
              <div className="eyebrow no-rule" style={{color:"var(--pc-green)", marginBottom:24}}>Sua recuperação estimada</div>
              <div style={{paddingBottom:20, marginBottom:20, borderBottom:"1px solid var(--border-on-dark)"}}>

          <TweakColor label="Cor de destaque" value={t.heroAccent}
            onChange={v=>setTweak('heroAccent', v)}
            options={["#3AD580","#F4B83A","#FF8C5A","#5BA8FF","#C56BFF"]} />
        </TweakSection>
        <TweakSection label="Treinamento">
          <TweakRadio label="Detalhamento" value={t.trainingDetail}
            onChange={v=>setTweak('trainingDetail', v)}
            options={[{value:"compact", label:"Compacto"},{value:"expanded", label:"Módulos"}]} />
        </TweakSection>
        <TweakSection label="Seções visíveis">
          <TweakToggle label="Marquee" value={t.showMarquee} onChange={v=>setTweak('showMarquee', v)} />
          <TweakToggle label="Prova social" value={t.showSocial} onChange={v=>setTweak('showSocial', v)} />
          <TweakToggle label="Comparativo" value={t.showCompare} onChange={v=>setTweak('showCompare', v)} />
          <TweakToggle label="Calc. de ROI" value={t.showROI} onChange={v=>setTweak('showROI', v)} />
        </TweakSection>
        <TweakSection label="Movimento">
          <TweakSlider label="Marquee (s)" value={t.marqueeSpeed} min={15} max={80} step={1}
            onChange={v=>setTweak('marqueeSpeed', v)} />
        </TweakSection>
      </TweaksPanel>
    </TweaksCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
